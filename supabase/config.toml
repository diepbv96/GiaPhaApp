project_id = "gia-pha-bui"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://127.0.0.1:5173"
additional_redirect_urls = ["http://127.0.0.1:5173"]
jwt_expiry = 3600
enable_signup = false

[storage]
enabled = true

# send-event-reminders (supabase/functions/send-event-reminders/) is scheduled to run
# once daily via a Cron Trigger configured in the Supabase Dashboard (Edge Functions >
# send-event-reminders > Cron), since Cron Triggers are a per-project dashboard/API
# setting, not something this local config.toml can express. Required secrets are
# documented in supabase/functions/send-event-reminders/.env.example — see README.md
# for full deployment steps.
