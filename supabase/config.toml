project_id = "gia-pha-bui"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://127.0.0.1:5173"
additional_redirect_urls = ["http://127.0.0.1:5173"]
jwt_expiry = 3600
enable_signup = false

[storage]
enabled = true

# send-event-reminders (supabase/functions/send-event-reminders/) is scheduled to run
# once daily at 06:00 Asia/Ho_Chi_Minh via the pg_cron + pg_net job created in
# supabase/migrations/0020_schedule_event_reminders_cron.sql (not expressible in this
# local config.toml). Required Edge Function secrets are documented in
# supabase/functions/send-event-reminders/.env.example — see README.md for full
# deployment steps.
