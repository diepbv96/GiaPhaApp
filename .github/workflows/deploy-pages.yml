name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; a new push cancels an in-flight deploy rather than queueing.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check, lint, and unit test
        run: |
          npm run lint
          npx vitest run

      - name: Build
        env:
          # Repo Settings → Secrets and variables → Actions → New repository secret.
          # These are the same values as your local .env (see .env.example) — the
          # Supabase publishable key is safe to embed in a client bundle by design,
          # but is still read from a secret rather than committed anywhere.
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          # Project pages are served from https://<owner>.github.io/<repo>/, so the
          # built asset paths and router basename need that subpath baked in.
          BASE_PATH: /${{ github.event.repository.name }}/
        run: npm run build

      - name: Add SPA fallback for client-side routing (deep-link refresh support)
        run: cp dist/index.html dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
